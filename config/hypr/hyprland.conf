# в–Ҳв–Җв–ҖвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–‘в–ҲвҖғ вҖғв–Ҳв–‘в–ҲвҖғв–„в–Җв–ҲвҖғв–Ҳв–Җв–Ҳ
# в–Ҳв–Ҳв–„вҖғв–Ҳв–‘в–Җв–ҲвҖғв–Җв–„в–ҖвҖғ вҖғв–Җв–„в–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–„

# -----------------------------------------------------
# Monitor
# -----------------------------------------------------
monitor=eDP-1,1920x1080@60.0,0x0,1

# -----------------------------------------------------
# Autostart
# -----------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user stop xdg-desktop-portal-hyprland xdg-desktop-portal-gtk xdg-desktop-portal
exec-once = systemctl --user start xdg-desktop-portal-hyprland xdg-desktop-portal-gtk xdg-desktop-portal
exec-once = xsettingsd

exec-once=swaybg -m fit -i $HOME/Desktop/Fondos/cthulhu_wallpap.png
exec-once=foot --server
exec-once=wlsunset -l -23 -L -46
exec-once=dunst
exec-once=~/.config/waybar/launch.sh


# GSettings for Themes

exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
exec = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"   # for GTK3 apps

# -----------------------------------------------------
# Environment Variables
# -----------------------------------------------------

env = GTK_THEME,Adwaita-dark
env = GTK_USE_PORTAL,1

env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1

# NVIDIA & Hybrid Graphics (Fix for ChimeraX / GBM)
env = LIBVA_DRIVER_NAME,radeonsi
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

# Prime Offload (Force NVIDIA when needed)
#env = __NV_PRIME_RENDER_OFFLOAD,1
env = __VK_LAYER_NV_optimus,NVIDIA_only

# Firefox Hardware Acceleration
env = MOZ_DISABLE_RDD_SANDBOX,1
env = EGL_PLATFORM,wayland

# Toolkit Backends (Qt, GDK, SDL)
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# Qt Theme & Scaling
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1 
#env = QT_STYLE_OVERRIDE,kvantum-dark

# Cursor
env = XCURSOR_THEME,Nordzy
env = XCURSOR_SIZE,24

# -----------------------------------------------------
# Input
# -----------------------------------------------------
input {
  kb_layout = es
  follow_mouse = 0
  mouse_refocus = 0 
  sensitivity = 0.2 
  force_no_accel = false
  float_switch_override_focus = 1
  accel_profile = flat
  natural_scroll = true

  touchpad {
        natural_scroll = true 
        disable_while_typing = true
        tap-to-click = true
        drag_lock = false
        scroll_factor = 1.0
  }
}

# -----------------------------------------------------
# General
# -----------------------------------------------------
general {
  gaps_in = 5
  gaps_out = 5
  border_size = 1
  col.active_border = rgba(ffffff90) rgba(87ceeb90) 45deg 1
  col.inactive_border = rgba(382d2e9f)
  # layout = dwindle
}

# -----------------------------------------------------
# Misc
# -----------------------------------------------------
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  vfr = true
  vrr = 0
  animate_manual_resizes = true
  mouse_move_focuses_monitor = true
  enable_swallow = true
  swallow_regex = ^(wezterm)$
}

# -----------------------------------------------------
# XWayland (Fix for blurry apps)
# -----------------------------------------------------
xwayland {
  force_zero_scaling = true
}

# -----------------------------------------------------
# Layouts
# -----------------------------------------------------
dwindle {
  pseudotile = true 
  preserve_split = true 
}

master {
    new_status = master
    orientation = left
}

# -----------------------------------------------------
# Decoration
# -----------------------------------------------------
decoration {
  rounding = 15
  active_opacity = 0.95
  inactive_opacity = 0.95
  
  # Shadow & Blur (Disabled for performance/preference)
  # drop_shadow = false
  # blur = true
}

# -----------------------------------------------------
# Cursor (Hyprland > v0.41)
# -----------------------------------------------------
cursor {
    no_hardware_cursors = true
    enable_hyprcursor = true
    no_warps = false
}

# -----------------------------------------------------
# Window Rules
# -----------------------------------------------------

windowrule {
    name = xtra-menu
    match:class = ^(xtra_menu\.py)$
    float = on
    move = cursor_x-100 cursor_y+50
}

windowrule {
    name = kitty-rule
    match:initial_class = ^(kitty)$
    float = on
    size = 1220 780
    center = on
    workspace = 1
}

# -----------------------------------------------------
# Keybindings
# -----------------------------------------------------
$mainMod = SUPER
$HYPRSCRIPTS = ~/.config/hypr/scripts

bind = ALT, Tab, cyclenext, visible hist

# Swap Workspaces
bind = $mainMod, Tab, exec, $HYPRSCRIPTS/workspace_toggle.sh

# --- System & Apps ---
bind = $mainMod, Return, exec, kitty
bind = $mainMod, D, exec, rofi -show run
bind = $mainMod, Q, killactive
bind = ALT, F4, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, T, togglefloating
bind = $mainMod, J, togglesplit
bind = $mainMod, G, togglegroup

# --- Focus & Move ---
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Down, movefocus, d

bind = $mainMod ALT, Left, movewindow, l
bind = $mainMod ALT, Right, movewindow, r
bind = $mainMod ALT, Up, movewindow, u
bind = $mainMod ALT, Down, movewindow, d

bindm = SUPER, mouse:272, movewindow
# --- Resize ---
binde = $mainMod SHIFT, Right, resizeactive, 50 0
binde = $mainMod SHIFT, Left, resizeactive, -50 0
binde = $mainMod SHIFT, Down, resizeactive, 0 50
binde = $mainMod SHIFT, Up, resizeactive, 0 -50

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Mouse & Scroll Workspaces ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- Screenshot & Scripts ---
bind = $mainMod, PRINT, exec, $HYPRSCRIPTS/screenshot.sh
bind = $mainMod ALT, S, exec, $HYPRSCRIPTS/screenshot.sh --instant-area
bind = $mainMod CTRL, R, exec, hyprctl reload
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/waypaper.sh --random
bind = $mainMod CTRL, W, exec, ~/.config/hypr/scripts/waypaper.sh
bind = $mainMod CTRL, L, exec, ~/.config/hypr/scripts/power.sh lock

# --- Fn Keys (Volume/Brightness) ---
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86KbdBrightnessUp, exec, brightnessctl set +1 --device='asus::kbd_backlight'
bind = , XF86KbdBrightnessDown, exec, brightnessctl set 1- --device='asus::kbd_backlight'
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
